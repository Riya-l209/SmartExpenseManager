<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Add Expense</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h1>Add Expense 💸</h1>

<form id="expenseForm">

<input type="text" id="title" placeholder="Expense Title (Food, Cab, etc)" required>

<input type="number" id="amount" placeholder="Amount ₹" required>

<select id="category">
<option>Food</option>
<option>Transport</option>
<option>Shopping</option>
<option>Education</option>
<option>Other</option>
</select>

<button type="submit">Add Expense</button>

</form>

<br>

<a href="student.html">
<button>Back to Dashboard</button>
</a>

</div>

<script src="script.js"></script>

</body>
</html>
