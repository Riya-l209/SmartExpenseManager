<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Student Dashboard</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

</head>

<body>

<div class="dashboard">

<!-- Sidebar -->

<div class="sidebar">

<h2>FinPersona</h2>

<ul>
<li>🏠 Dashboard</li>
<li>💸 Expenses</li>
<li>🎯 Goals</li>
<li>📊 Insights</li>
<li>⚙ Settings</li>
</ul>

</div>

<!-- Main Content -->

<div class="main-content">

<h1>Student Dashboard</h1>

<p>Track your spending and stay financially smart.</p>

<div class="cards">

<div class="card">
<h3>Monthly Budget</h3>
<p>₹ 10,000</p>
</div>

<div class="card">
<h3>Spent</h3>
<p>₹ 0</p>
</div>

<div class="card">
<h3>Remaining</h3>
<p>₹ 10,000</p>
</div>

</div>

<button class="add-expense-btn">
+ Add Expense
</button>

</div>

</div>

<script src="script.js"></script>

</body>

</html>
