<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Student Dashboard</title>
<link rel="stylesheet" href="style.css">

<style>

body{
    font-family:Poppins;
    background:linear-gradient(135deg,#f6d5ff,#ffd6ec,#e8dcff);
    margin:0;
}

.header{
    display:flex;
    justify-content:space-between;
    padding:20px 40px;
}

.header h1{
    color:#444;
}

.add-btn{
    background:#ff7ad9;
    border:none;
    padding:12px 20px;
    color:white;
    border-radius:25px;
    cursor:pointer;
}

.dashboard{
    display:flex;
    justify-content:center;
    gap:30px;
    margin-top:20px;
}

.card{
    background:white;
    padding:25px;
    border-radius:15px;
    width:200px;
    text-align:center;
    box-shadow:0 10px 20px rgba(0,0,0,0.1);
}

.table-container{
    margin:40px;
    background:white;
    padding:20px;
    border-radius:15px;
}

table{
    width:100%;
    border-collapse:collapse;
}

th,td{
    padding:12px;
    text-align:center;
    border-bottom:1px solid #eee;
}

</style>

</head>

<body>

<div class="header">

<h1>Student Finance Dashboard</h1>

<button class="add-btn" onclick="goToAddExpense()">Add Expense</button>

</div>


<div class="dashboard">

<div class="card">
<h3>Balance</h3>
<h2 id="balance">₹0</h2>
</div>

<div class="card">
<h3>Total Income</h3>
<h2 id="income">₹0</h2>
</div>

<div class="card">
<h3>Total Expense</h3>
<h2 id="expense">₹0</h2>
</div>

</div>


<div class="table-container">

<h2>Transactions</h2>

<table>

<thead>
<tr>
<th>Title</th>
<th>Amount</th>
<th>Category</th>
</tr>
</thead>

<tbody id="transaction-list">
</tbody>

</table>

</div>

<script src="script.js"></script>

</body>

</html>
